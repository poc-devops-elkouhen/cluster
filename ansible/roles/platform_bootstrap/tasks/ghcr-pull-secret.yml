---
- name: Vérifier que le secret GHCR chiffré existe
  ansible.builtin.stat:
    path: "{{ ghcr_pull_secret_file }}"
  register: ghcr_pull_secret_stat

- name: Échouer si le secret GHCR chiffré est introuvable
  ansible.builtin.fail:
    msg: "ghcr_pull_secret_file={{ ghcr_pull_secret_file }} introuvable"
  when: not ghcr_pull_secret_stat.stat.exists

- name: Déchiffrer et déposer le secret source GHCR dans argocd
  ansible.builtin.shell: |
    set -o pipefail
    SOPS_AGE_KEY_FILE={{ sops_age_key_file }} sops --decrypt {{ ghcr_pull_secret_file }} \
      | kubectl apply -n {{ argocd_namespace }} -f -
  register: ghcr_pull_secret_apply
  changed_when: "'unchanged' not in ghcr_pull_secret_apply.stdout"
