---
# Phase 2 : initialisation du cluster Kubernetes
#
# Ce playbook exécute uniquement les tâches qui nécessitent un cluster actif.
# Tout ce qui peut être fait sans cluster tourne dans les images Packer (phase 1).
#
# Tâches exclues de Packer (skip-tags appliqués dans les .pkr.hcl) :
#   master.pkr.hcl : kubeadm, kubeconfig, cni, flannel, metrics-server,
#                    join-command, platform
#   worker.pkr.hcl : join
#
# Opportunités de migration vers Packer (non encore exploitées) :
#   - binaire Helm : téléchargement + copie d'un binaire statique, aucun
#     cluster requis ; seuls helm repo add / upgrade --install doivent rester
#     en phase 2.
#
# Prérequis : les VMs sont démarrées et l'inventaire est à jour.
# Ordre d'exécution : init master → join workers → déploiement platform.

- hosts: kubernetes
  become: true
  tasks:
    - name: Désactiver le swap pour la session actuelle
      ansible.builtin.command: swapoff -a
      when: ansible_facts['swaptotal_mb'] > 0
      tags:
        - cluster-start
        - swap

    - name: Désactiver le swap de manière permanente (fstab)
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s+.*)$'
        replace: '# \1'
      tags:
        - cluster-start
        - swap

    - name: Configure Vagrant private IPv4 connection
      ansible.builtin.command: >-
        nmcli connection modify {{ flannel_iface }}
        ipv4.addresses {{ inventory_hostname }}/24
        ipv4.method manual
        connection.autoconnect yes
      tags:
        - cluster-start
        - network

    - name: Bring up Vagrant private IPv4 connection
      ansible.builtin.command: "nmcli connection up {{ flannel_iface }}"
      tags:
        - cluster-start
        - network

    - name: Wait for Vagrant private IPv4 address
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        state: started
        timeout: 60
      tags:
        - cluster-start
        - network

- hosts: kubernetes-master
  roles:
    - role: kubernetes-master
      become: true
      tags:
        - kubernetes-master
        - control-plane

- hosts: kubernetes-node
  roles:
    - role: kubernetes-node
      become: true
      tags:
        - kubernetes-node
        - worker

- hosts: kubernetes-master
  roles:
    - role: kubernetes-platform
      become: true
      tags:
        - kubernetes-platform
        - platform

- hosts: kubernetes
  become: true
  vars:
    _registry_ip: "{{ metallb_addresses[0].split('-')[0] }}"
    _registry_host: "registry.{{ _registry_ip }}.nip.io"
    _certs_dir: "/etc/containerd/certs.d/{{ _registry_host }}"
    _cert_src: /tmp/kubernetes-platform/wildcard-tls.crt
  tags:
    - registry-cert
  tasks:
    - name: Slurp wildcard TLS cert from master
      ansible.builtin.slurp:
        src: "{{ _cert_src }}"
      register: _wildcard_cert
      delegate_to: "{{ groups['kubernetes-master'][0] }}"
      run_once: true

    - name: Create containerd certs.d directory for registry
      ansible.builtin.file:
        path: "{{ _certs_dir }}"
        state: directory
        mode: '0755'

    - name: Copy wildcard TLS cert for registry
      ansible.builtin.copy:
        content: "{{ _wildcard_cert.content | b64decode }}"
        dest: "{{ _certs_dir }}/ca.crt"
        mode: '0644'
      notify: restart containerd

    - name: Create hosts.toml for registry
      ansible.builtin.copy:
        dest: "{{ _certs_dir }}/hosts.toml"
        mode: '0644'
        content: |
          server = "https://{{ _registry_host }}"

          [host."https://{{ _registry_host }}"]
            ca = ["{{ _certs_dir }}/ca.crt"]
      notify: restart containerd

  handlers:
    - name: restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
